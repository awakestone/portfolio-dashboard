<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Awakestone Portfolio Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>Awakestone Portfolio</h1>

<div class="subtitle">
AI Growth & Macro Dashboard
</div>

</header>

<!-- 第一排：核心资产 -->

<section class="grid">

<div class="card">
<h3>总资产 USD</h3>
<div id="totalUsd" class="value">$0</div>
</div>

<div class="card">
<h3>总资产 CNY</h3>
<div id="totalCny" class="value">¥0</div>
</div>

<div class="card">
<h3>总浮盈亏</h3>
<div id="totalPnl" class="value">$0</div>
</div>

<div class="card">
<h3>总收益率</h3>
<div id="totalReturn" class="value">0%</div>
</div>

</section>

<!-- 第二排：仓位分析 -->

<section class="grid">

<div class="card">
<h3>AI仓位</h3>
<div id="aiWeight" class="value">0%</div>
</div>

<div class="card">
<h3>杠杆仓位</h3>
<div id="leveragedWeight" class="value">0%</div>
</div>

<div class="card">
<h3>债券仓位</h3>
<div id="bondWeight" class="value">0%</div>
</div>

<div class="card">
<h3>现金仓位</h3>
<div id="cashWeight" class="value">0%</div>
</div>

</section>

<!-- 风险监控 -->

<section class="card">

<h3>风险监控中心</h3>

<div id="largestPosition"></div>

<br>

<div id="nvdaExposure"></div>

<br>

<div id="riskAlerts" class="warning"></div>

</section>

<!-- 图表区域 -->

<section class="grid">

<div class="card">

<h3>持仓占比</h3>

<canvas id="pieChart"></canvas>

</div>

<div class="card">

<h3>资产分类</h3>

<canvas id="allocationChart"></canvas>

</div>

</section>

<!-- 持仓表 -->

<section class="table-container">

<table>

<thead>

<tr>

<th>代码</th>
<th>股数</th>
<th>成本</th>
<th>现价</th>
<th>收益率</th>
<th>市值</th>
<th>盈亏</th>
<th>占比</th>

</tr>

</thead>

<tbody id="portfolioBody">

</tbody>

</table>

</section>

<script src="app.js"></script>

</body>

</html>
