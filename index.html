<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awakestone Portfolio Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

h1{
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h3{
    margin:0 0 10px 0;
    font-size:14px;
    color:#666;
}

.value{
    font-size:24px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

th{
    background:#f0f0f0;
}

th,td{
    padding:10px;
    border-bottom:1px solid #eee;
    text-align:right;
}

th:first-child,
td:first-child{
    text-align:left;
}

canvas{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-top:20px;
}

.positive{
    color:green;
}

.negative{
    color:red;
}

</style>
</head>

<body>

<h1>投资组合仪表盘</h1>

<div class="grid">

<div class="card">
<h3>总资产 USD</h3>
<div id="totalUsd" class="value">$0</div>
</div>

<div class="card">
<h3>总资产 CNY</h3>
<div id="totalCny" class="value">¥0</div>
</div>

<div class="card">
<h3>总浮盈亏</h3>
<div id="totalPnl" class="value">$0</div>
</div>

<div class="card">
<h3>总收益率</h3>
<div id="totalReturn" class="value">0%</div>
</div>

</div>

<table>

<thead>

<tr>
<th>代码</th>
<th>股数</th>
<th>成本</th>
<th>现价</th>
<th>市值</th>
<th>盈亏</th>
<th>占比</th>
</tr>

</thead>

<tbody id="portfolioBody">
</tbody>

</table>

<canvas id="pieChart"></canvas>

const API_KEY = "这里替换成你的新APIKEY";

{symbol:"UPRO",shares:30,cost:63.00},
{symbol:"SGOV",shares:40,cost:100.47},
{symbol:"TSLA",shares:2,cost:225.38}

];

</script>

</body>
</html>
