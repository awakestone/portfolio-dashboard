<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Awakestone Portfolio V4</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>Awakestone Portfolio</h1>

<div class="subtitle">
AI Growth · Leveraged Growth · Macro Allocation
</div>

<div id="lastUpdate" class="update-time">
更新时间 --:--
</div>

</header>

<!-- HERO -->

<section class="hero-card">

<div class="hero-label">
PORTFOLIO VALUE
</div>

<div id="totalUsd" class="hero-value">
$0.00
</div>

<div id="totalCny" class="hero-cny">
≈ ¥0.00
</div>

<div class="hero-stats">

<div>

<div class="hero-small">
P&L
</div>

<div id="totalPnl"
class="hero-number">
$0.00
</div>

</div>

<div>

<div class="hero-small">
RETURN
</div>

<div id="totalReturn"
class="hero-number">
0.00%
</div>

</div>

</div>

</section>

<!-- ALLOCATION -->

<section class="metric-grid">

<div class="metric-card">
<div class="metric-title">AI</div>
<div id="aiWeight" class="metric-value">0%</div>
</div>

<div class="metric-card">
<div class="metric-title">Leveraged</div>
<div id="leveragedWeight" class="metric-value">0%</div>
</div>

<div class="metric-card">
<div class="metric-title">Bond</div>
<div id="bondWeight" class="metric-value">0%</div>
</div>

<div class="metric-card">
<div class="metric-title">Cash</div>
<div id="cashWeight" class="metric-value">0%</div>
</div>

</section>

<!-- TOP HOLDINGS -->

<section class="card">

<h3>TOP HOLDINGS</h3>

<div id="topHoldings"></div>

</section>

<!-- RISK -->

<section class="card">

<h3>风险监控</h3>

<div class="risk-item">
<span>最大持仓</span>
<span id="largestPosition">--</span>
</div>

<div class="risk-item">
<span>NVDA占比</span>
<span id="nvdaExposure">--</span>
</div>

<div class="risk-item">
<span>前3大持仓</span>
<span id="top3Exposure">--</span>
</div>

<div id="riskAlerts"
class="risk-alerts">
</div>

</section>

<!-- CHART -->

<section class="card">

<h3>资产分类</h3>

<canvas id="allocationChart"></canvas>

</section>

<!-- MOBILE -->

<section class="card mobile-only">

<h3>持仓卡片</h3>

<div id="holdingCards"></div>

</section>

<!-- DESKTOP -->

<section class="card desktop-only">

<h3>持仓明细</h3>

<div class="table-container">

<table>

<thead>

<tr>
<th>代码</th>
<th>股数</th>
<th>成本</th>
<th>现价</th>
<th>收益率</th>
<th>市值</th>
<th>盈亏</th>
<th>占比</th>
</tr>

</thead>

<tbody id="portfolioBody">

</tbody>

</table>

</div>

</section>

<script src="app.js"></script>

</body>

</html>
